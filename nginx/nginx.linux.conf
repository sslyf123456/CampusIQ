# Nginx 配置 (Linux) — 基于 RAG + 多智能体校园问答助手
#
# 前置: apt install nginx (Ubuntu/Debian) 或 yum install nginx (CentOS)
#
# 用法:
#   1. 将此文件部署到 /etc/nginx/nginx.conf 或 include 到 sites-available
#   2. 修改下方 root 路径为实际前端 dist 目录
#   3. nginx -t                 (检查语法)
#   4. systemctl start nginx    (启动)
#   5. systemctl reload nginx   (热重载)
#   6. systemctl stop nginx     (停止)
#
# 架构:
#   :80  Nginx (统一入口)
#     /            -> 前端静态文件 (frontend/dist)
#     /api/campus/ -> campus-service :8001
#     /api/ai/     -> ai-service :8002 (SSE 流式, 禁用缓冲)

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # 上传体积限制 (报修描述、通知内容等)
    client_max_body_size 10m;

    # Gzip 压缩 (静态资源)
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;

    # ------------------------------------------------------------------ #
    # 上游服务
    # ------------------------------------------------------------------ #
    upstream campus_service {
        server 127.0.0.1:8001;
    }

    upstream ai_service {
        server 127.0.0.1:8002;
    }

    # ------------------------------------------------------------------ #
    # 主服务器
    # ------------------------------------------------------------------ #
    server {
        listen 80;
        server_name localhost;

        # ====== 按实际路径修改此项 ======
        # 前端构建产物路径 (npm run build 后的 dist 目录)
        root /opt/campus-qa/frontend/dist;
        index index.html;

        # ------------------------------------------------------------------ #
        # 前端静态文件 (Vue 3 SPA, history 路由模式)
        # ------------------------------------------------------------------ #
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源缓存 (Vite 构建带 hash, 可长期缓存)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ------------------------------------------------------------------ #
        # campus-service 反向代理
        # ------------------------------------------------------------------ #
        location /api/campus/ {
            proxy_pass http://campus_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }

        # ------------------------------------------------------------------ #
        # ai-service 反向代理
        # 关键: SSE 流式输出必须禁用缓冲, 否则前端收不到逐字推送
        # ------------------------------------------------------------------ #
        location /api/ai/ {
            proxy_pass http://ai_service;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE 核心配置: 禁用缓冲, 保持长连接
            proxy_buffering    off;
            proxy_cache        off;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";

            # LLM 响应可能较慢, 放宽超时
            proxy_connect_timeout 10s;
            proxy_read_timeout    300s;
            proxy_send_timeout    300s;
        }

        # ------------------------------------------------------------------ #
        # 健康检查 (可选, 便于外部监控)
        # ------------------------------------------------------------------ #
        location = /health/campus {
            proxy_pass http://campus_service/health;
            access_log off;
        }

        location = /health/ai {
            proxy_pass http://ai_service/health;
            access_log off;
        }

        # ------------------------------------------------------------------ #
        # 错误页
        # ------------------------------------------------------------------ #
        error_page 404 /index.html;
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            default_type text/html;
            return 502 '<!DOCTYPE html><html><body style="font-family:sans-serif;text-align:center;padding:50px"><h2>502</h2><p>服务暂时不可用，请稍后重试。</p></body></html>';
        }
    }
}
